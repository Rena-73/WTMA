<!DOCTYPE html>
<html>
<head>
    <title>Charity Booking - Inline CSS</title>
</head>
<body style="margin:0; font-family:Arial; background:#f2f2f2;">

    <!-- Header -->
    <div style="background:#2c3e50; color:white; padding:20px; text-align:center;">
        <h1>Helping Hands Charity</h1>
    </div>

    <!-- Navigation -->
    <div style="background:#34495e; padding:10px; text-align:center;">
        <a href="#" style="color:white; margin:15px; text-decoration:none;">Home</a>
        <a href="#" style="color:white; margin:15px; text-decoration:none;">Donate</a>
        <a href="#" style="color:white; margin:15px; text-decoration:none;">Events</a>
        <a href="#" style="color:white; margin:15px; text-decoration:none;">Contact</a>
    </div>

    <!-- Main Section -->
    <div style="width:70%; margin:30px auto; background:white; padding:20px; border-radius:10px;">

        <h2 style="color:#e67e22;">Event Booking Form</h2>

        <form>
            <label>Name:</label><br>
            <input type="text" style="width:100%; padding:8px; margin:8px 0;"><br>

            <label>Email:</label><br>
            <input type="email" style="width:100%; padding:8px; margin:8px 0;"><br>

            <label>Select Event:</label><br>
            <select style="width:100%; padding:8px; margin:8px 0;">
                <option>Food Donation Drive</option>
                <option>Education Support Program</option>
                <option>Medical Camp</option>
            </select><br>

            <button style="background:#27ae60; color:white; padding:10px 15px; border:none; margin-top:10px;">
                Book Now
            </button>
        </form>

    </div>

    <!-- Footer -->
    <div style="background:#2c3e50; color:white; text-align:center; padding:15px;">
        © 2026 Helping Hands Charity
    </div>

</body>
</html>
